# ============================================
# Server Configuration
# ============================================
server.port=8081

# ============================================
# MongoDB Atlas Configuration
# ============================================
spring.data.mongodb.uri=mongodb+srv://workwithharesh_db_user:fWcc5FcjFscaLg2i@hareshscluster.bndp9ld.mongodb.net/resumeTailor?retryWrites=true&w=majority&ssl=true
spring.data.mongodb.database=resumeTailor

# ============================================
# LangChain4j / Ollama Configuration
# ============================================
langchain4j.ollama.chat-model.base-url=http://localhost:11434
langchain4j.ollama.chat-model.model-name=llama3
langchain4j.ollama.chat-model.timeout=PT120S
langchain4j.ollama.chat-model.temperature=0.3

# ============================================
# File Upload Configuration
# ============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================
# Logging
# ============================================
logging.level.com.resumetailor=DEBUG
logging.level.dev.langchain4j=DEBUG

# ============================================
# AWS S3 Configuration
# ============================================
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME:resume-tailor-pdfs}
aws.s3.region=${AWS_REGION:ap-south-1}
aws.s3.access-key=${AWS_ACCESS_KEY_ID:}
aws.s3.secret-key=${AWS_SECRET_ACCESS_KEY:}
aws.s3.presigned-url-expiry-minutes=${AWS_S3_PRESIGNED_URL_EXPIRY:60}

